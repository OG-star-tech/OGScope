# OGScope：持久化 systemd journal，便于卡死/重启后排查 / Persistent journal for post-freeze diagnosis
#
# 安装：由 scripts/install.sh 复制到 /etc/systemd/journald.conf.d/
# Install: copied by scripts/install.sh to /etc/systemd/journald.conf.d/

[Journal]
# 重启后仍保留上次及更早启动日志，可用 journalctl -b -1 查看「上一次启动」
# Keep logs across reboots; use `journalctl -b -1` for the previous boot
Storage=persistent

# 控制 SD 卡占用；Zero 2W 场景下 64M 通常足够保留多次启动 / Cap disk usage on SD cards
SystemMaxUse=64M
SystemMaxFileSize=8M

# 超过约两周的日志删除 / Drop journals older than ~2 weeks
MaxRetentionSec=14d

# 默认 5min 同步一次；缩短以降低突然掉电/硬复位时丢失最后一段日志的概率
# Sync more often than default 5m to reduce loss on sudden power loss
SyncIntervalSec=1min
