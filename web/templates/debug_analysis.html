<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGScope 星图解算工作台</title>
    <link rel="stylesheet" href="/static/css/debug-analysis.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <h1>OGScope 星图解算工作台</h1>
            <div class="topbar-actions">
                <button class="btn" onclick="window.location.href='/debug'">返回调试控制台</button>
                <button class="btn" onclick="window.location.href='/'">返回首页</button>
            </div>
        </header>

        <main class="main-grid">
            <section class="card">
                <h2>1. 星表管理</h2>
                <div class="row">
                    <label for="catalog-source">数据源</label>
                    <select id="catalog-source">
                        <option value="seed">内置亮星种子（推荐）</option>
                        <option value="url">自定义 URL（CSV）</option>
                    </select>
                </div>
                <div class="row">
                    <label for="catalog-url">URL</label>
                    <input id="catalog-url" type="text" placeholder="https://example.com/catalog.csv">
                </div>
                <div class="row">
                    <label for="magnitude-limit">星等上限</label>
                    <input id="magnitude-limit" type="number" step="0.1" value="8.5">
                </div>
                <div class="row">
                    <label for="ra-bin-size">RA 分桶角度</label>
                    <input id="ra-bin-size" type="number" step="1" value="15">
                </div>
                <div class="actions">
                    <button class="btn primary" id="catalog-download-btn">下载/生成星表</button>
                    <button class="btn primary" id="catalog-build-btn">构建索引</button>
                    <button class="btn" id="catalog-status-btn">刷新状态</button>
                </div>
                <pre id="catalog-status" class="output">等待操作...</pre>
            </section>

            <section class="card">
                <h2>1.1 星点 CRUD</h2>
                <div class="row">
                    <label for="star-source-id">source_id</label>
                    <input id="star-source-id" type="text" value="custom_star_001">
                </div>
                <div class="row">
                    <label for="star-ra">RA</label>
                    <input id="star-ra" type="number" step="0.0001" value="120.0">
                </div>
                <div class="row">
                    <label for="star-dec">Dec</label>
                    <input id="star-dec" type="number" step="0.0001" value="45.0">
                </div>
                <div class="row">
                    <label for="star-pmra">pmRA</label>
                    <input id="star-pmra" type="number" step="0.0001" value="0.0">
                </div>
                <div class="row">
                    <label for="star-pmdec">pmDec</label>
                    <input id="star-pmdec" type="number" step="0.0001" value="0.0">
                </div>
                <div class="row">
                    <label for="star-mag">Gmag</label>
                    <input id="star-mag" type="number" step="0.01" value="6.5">
                </div>
                <div class="row">
                    <label for="star-query">查询条件</label>
                    <input id="star-query" type="text" placeholder="source_id关键字">
                </div>
                <div class="actions">
                    <button class="btn primary" id="star-create-btn">新增</button>
                    <button class="btn primary" id="star-update-btn">更新</button>
                    <button class="btn danger" id="star-delete-btn">删除</button>
                    <button class="btn" id="star-get-btn">按ID查询</button>
                    <button class="btn" id="star-list-btn">分页查询</button>
                </div>
                <pre id="star-output" class="output">等待操作...</pre>
            </section>

            <section class="card">
                <h2>2. 素材上传与分析</h2>
                <div class="row">
                    <label for="analysis-file">上传图片/视频</label>
                    <input id="analysis-file" type="file" accept="image/*,video/*">
                </div>
                <div class="row">
                    <label for="hint-ra">RA 提示(度)</label>
                    <input id="hint-ra" type="number" step="0.1" value="45">
                </div>
                <div class="row">
                    <label for="hint-dec">Dec 提示(度)</label>
                    <input id="hint-dec" type="number" step="0.1" value="80">
                </div>
                <div class="row">
                    <label for="frame-step">视频抽帧间隔</label>
                    <input id="frame-step" type="number" min="1" step="1" value="2">
                </div>
                <div class="row">
                    <label for="max-frames">最大帧数</label>
                    <input id="max-frames" type="number" min="1" step="1" value="60">
                </div>
                <div class="actions">
                    <button class="btn primary" id="upload-btn">上传素材</button>
                    <button class="btn primary" id="solve-image-btn">直接解算图片</button>
                    <button class="btn primary" id="create-video-job-btn">创建视频任务</button>
                    <button class="btn" id="query-job-btn">查询最近任务</button>
                </div>
                <pre id="analysis-output" class="output">等待操作...</pre>
            </section>

            <section class="card">
                <h2>3. 实时解算</h2>
                <div class="actions">
                    <button class="btn primary" id="realtime-start-btn">启动实时解算</button>
                    <button class="btn danger" id="realtime-stop-btn">停止实时解算</button>
                    <button class="btn" id="realtime-status-btn">刷新实时状态</button>
                    <label class="inline">
                        <input type="checkbox" id="auto-poll-status" checked>
                        自动刷新(2s)
                    </label>
                </div>
                <pre id="realtime-output" class="output">等待操作...</pre>
            </section>
        </main>
    </div>

    <script src="/static/js/debug-analysis.js?v={{ version }}"></script>
</body>
</html>
