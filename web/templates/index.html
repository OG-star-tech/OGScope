<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>OGScope - 电子极轴镜</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FF4500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OGScope">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#FF4500">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/static/images/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/images/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/icon-16x16.png">
    
    <!-- 现代化字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- 模块化CSS文件 -->
    <link rel="stylesheet" href="/static/css/core/base.css">
    <link rel="stylesheet" href="/static/css/core/layout.css">
    <link rel="stylesheet" href="/static/css/core/components.css">
    <link rel="stylesheet" href="/static/css/core/themes.css">
    <link rel="stylesheet" href="/static/css/shared/animations.css">
</head>
<body>
    <!-- 加载屏 -->
    <div id="loading-screen">
        <div class="loading-logo">⊕</div>
        <div class="loading-text">OGSCOPE</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="loading-status" id="loading-status">正在初始化...</div>
    </div>

    <!-- 主应用 -->
    <div id="app">
        <!-- 视频容器 -->
        <div class="video-container">
            <video id="video-stream" autoplay playsinline muted>
                您的浏览器不支持视频播放
            </video>

            <!-- 视频内叠加层 -->
            <div class="overlay">
                <!-- 顶部中央：GPS坐标 -->
                <div class="top-center-info">
                    <div class="gps-coordinate" id="gps-coord">39°54'26"N &nbsp;&nbsp; 116°23'29"E</div>
                </div>

                <!-- 左上角：海拔 -->
                <div class="top-left-info">
                    <div class="altitude-info">
                        <div class="altitude-value" id="altitude">43.8 m</div>
                    </div>
                </div>

                <!-- 右上角：WiFi、GPS信号、电量 -->
                <div class="top-right-info">
                    <div class="status-indicator">
                        <span class="status-icon" id="wifi-icon">
                            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ff6666">
                                <path d="M1.17157 5.82843L0 7L1.41421 8.41421L2.58579 7.24264C4.02173 5.8067 5.96928 5 8 5C10.0307 5 11.9783 5.8067 13.4142 7.24264L14.5858 8.41421L16 7L14.8284 5.82843C13.0174 4.01742 10.5612 3 8 3C5.43884 3 2.98259 4.01741 1.17157 5.82843Z"/>
                                <path d="M13.1716 9.82842L12 8.65686C10.9391 7.59599 9.5003 7 8.00001 7C6.49971 7 5.06087 7.59599 4.00001 8.65685L2.82843 9.82843L4.24264 11.2426L5.41422 10.0711C6.10001 9.38527 7.03015 9 8.00001 9C8.96986 9 9.9 9.38527 10.5858 10.0711L11.7574 11.2426L13.1716 9.82842Z"/>
                                <path d="M10.3432 12.6569L9.17158 11.4853C8.86086 11.1746 8.43943 11 8 11C7.56058 11 7.13915 11.1746 6.82843 11.4853L5.65686 12.6569L8.00001 15L10.3432 12.6569Z"/>
                            </svg>
                        </span>
                        <span class="status-value" id="wifi-strength">95%</span>
                    </div>
                    <div class="status-indicator">
                        <span class="status-icon" id="gps-icon">
                            <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ff6666">
                                <path d="M502.8 264.1l-80.37-80.37l47.87-47.88c13-13.12 13-34.37 0-47.5l-47.5-47.5c-13.12-13.12-34.38-13.12-47.5 0l-47.88 47.88L247.1 9.25C241 3.375 232.9 0 224.5 0c-8.5 0-16.62 3.375-22.5 9.25l-96.75 96.75c-12.38 12.5-12.38 32.62 0 45.12L185.5 231.5L175.8 241.4c-54-24.5-116.3-22.5-168.5 5.375c-8.498 4.625-9.623 16.38-2.873 23.25l107.6 107.5l-17.88 17.75c-2.625-.75-5-1.625-7.75-1.625c-17.75 0-32 14.38-32 32c0 17.75 14.25 32 32 32c17.62 0 32-14.25 32-32c0-2.75-.875-5.125-1.625-7.75l17.75-17.88l107.6 107.6c6.75 6.75 18.62 5.625 23.12-2.875c27.88-52.25 29.88-114.5 5.375-168.5l10-9.873l80.25 80.36c12.5 12.38 32.62 12.38 44.1 0l96.75-96.75C508.6 304.1 512 295.1 512 287.5C512 279.1 508.6 270.1 502.8 264.1zM219.5 197.4L150.6 128.5l73.87-73.75l68.86 68.88L219.5 197.4zM383.5 361.4L314.6 292.5l73.75-73.88l68.88 68.87L383.5 361.4z"/>
                            </svg>
                        </span>
                        <span class="status-value" id="gps-strength">98%</span>
                    </div>
                    <div class="status-indicator">
                        <span class="status-icon" id="battery-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ff6666">
                                <path d="M8 19H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6.625L8.458 7H4v10h4v2zm4.375 0l1.167-2H18V7h-4V5h5a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1h-6.625zM21 9h2v6h-2V9zm-9 2h3l-5 8v-6H7l5-8v6z"/>
                            </svg>
                        </span>
                        <span class="status-value" id="battery-level">87%</span>
                    </div>
                </div>

                <!-- 左下角：校准偏移 -->
                <div class="bottom-left-info">
                    <div class="info-panel calibration-offset">
                        <div class="info-label">极轴偏差</div>
                        <div class="offset-item">
                            <span class="offset-label">方位</span>
                            <span class="offset-value" id="azimuth-offset">+2.3°</span>
                        </div>
                        <div class="offset-item">
                            <span class="offset-label">高度</span>
                            <span class="offset-value" id="altitude-offset">-1.7°</span>
                        </div>
                    </div>
                </div>

                <!-- 右下角：图像质量 -->
                <div class="bottom-right-info">
                    <div class="info-panel image-quality">
                        <div class="info-label">星点清晰度</div>
                        <div class="quality-bar">
                            <div class="quality-fill" id="quality-fill"></div>
                        </div>
                        <span class="quality-value" id="quality-value">良好</span>
                    </div>
                </div>

                <!-- 中心准星 -->
                <div class="crosshair">
                    <div class="crosshair-line-h"></div>
                    <div class="crosshair-line-v"></div>
                    <div class="crosshair-circle"></div>
                </div>

                <!-- 目标引导线 -->
                <div class="guide-line">
                    <div class="guide-target"></div>
                </div>
            </div>
        </div>

        <!-- 外部控件 -->
        
        <!-- 右上角菜单 -->
        <button class="menu-button" id="menu-button">☰</button>

        <!-- 右侧缩放控件 -->
        <div class="zoom-control">
            <button class="zoom-button" id="zoom-in">+</button>
            <div class="zoom-slider">
                <div class="zoom-slider-thumb" id="zoom-thumb"></div>
            </div>
            <button class="zoom-button" id="zoom-out">−</button>
        </div>

        <!-- 右下角模式切换 -->
        <div class="mode-switcher">
            <button class="mode-button active" data-mode="polar">极轴</button>
            <button class="mode-button" data-mode="star">寻星</button>
            <button class="mode-button" data-mode="guide">导星</button>
        </div>

        <!-- 左上角高级模式 -->
        <button class="advanced-button">
            <span>⚙</span>
            <span>高级</span>
        </button>

        <!-- 快门控制 -->
        <div class="shutter-control-container">
            <button class="tool-toggle" id="shutter-toggle">📸</button>
            <div class="tool-group" id="shutter-tools">
                <div class="shutter-controls">
                    <div class="shutter-mode-selector">
                        <button class="shutter-mode active" data-mode="single">单次</button>
                        <button class="shutter-mode" data-mode="bulb">B门</button>
                        <button class="shutter-mode" data-mode="continuous">连拍</button>
                    </div>
                    <button class="shutter-button" id="shutter-button"></button>
                    <div class="shutter-timer" id="shutter-timer"></div>
                </div>
            </div>
        </div>

        <!-- 菜单面板 -->
        <div class="menu-panel" id="menu-panel">
            <button class="menu-close" id="menu-close">×</button>
            <div class="menu-item">
                <span>单位切换</span>
                <span>公制 ›</span>
            </div>
            <div class="menu-item">
                <span>语言</span>
                <span>简体中文 ›</span>
            </div>
            <div class="menu-item">
                <span>亮度调节</span>
                <span>自动 ›</span>
            </div>
            <div class="menu-item">
                <span>设备参数</span>
                <span>›</span>
            </div>
            <div class="menu-item">
                <span>网络设置</span>
                <span>›</span>
            </div>
            <div class="menu-item">
                <span>关于</span>
                <span>›</span>
            </div>
        </div>
    </div>

    <!-- 模块化JavaScript文件 -->
    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/constants.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/core/ui.js"></script>
    <script src="/static/js/core/camera.js"></script>
    <script src="/static/js/core/alignment.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
